{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vaults3.fullname" . }}
  labels:
    {{- include "vaults3.labels" . | nindent 4 }}
type: Opaque
data:
  access-key: {{ .Values.auth.accessKey | b64enc | quote }}
  {{- if .Values.auth.secretKey }}
  secret-key: {{ .Values.auth.secretKey | b64enc | quote }}
  {{- else }}
  {{/* Auto-generate on first install; preserve across upgrades via lookup. */}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace (include "vaults3.fullname" .) }}
  {{- if and $existing $existing.data (index $existing.data "secret-key") }}
  secret-key: {{ index $existing.data "secret-key" | quote }}
  {{- else }}
  secret-key: {{ randAlphaNum 40 | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
