apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vaults3.fullname" . }}
  labels:
    {{- include "vaults3.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "vaults3.fullname" . }}-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "vaults3.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the config changes.
        checksum/config: {{ .Values.config | toString | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vaults3.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "vaults3.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: vaults3
          image: {{ include "vaults3.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - "-config"
            - "/etc/vaults3/vaults3.yaml"
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          env:
            - name: VAULTS3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaults3.secretName" . }}
                  key: access-key
            - name: VAULTS3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaults3.secretName" . }}
                  key: secret-key
            - name: VAULTS3_DATA_DIR
              value: /data
            - name: VAULTS3_METADATA_DIR
              value: /metadata
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/vaults3
              readOnly: true
            - name: data
              mountPath: /data
            - name: metadata
              mountPath: /metadata
      volumes:
        - name: config
          configMap:
            name: {{ include "vaults3.configMapName" . }}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        - name: metadata
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "vaults3.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.data.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.data.size | quote }}
        {{- if .Values.persistence.data.storageClass }}
        {{- if (eq "-" .Values.persistence.data.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ .Values.persistence.data.storageClass | quote }}
        {{- end }}
        {{- end }}
    - metadata:
        name: metadata
        labels:
          {{- include "vaults3.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.metadata.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.metadata.size | quote }}
        {{- if .Values.persistence.metadata.storageClass }}
        {{- if (eq "-" .Values.persistence.metadata.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ .Values.persistence.metadata.storageClass | quote }}
        {{- end }}
        {{- end }}
  {{- end }}
