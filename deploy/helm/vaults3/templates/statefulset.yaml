{{- if and .Values.cluster.enabled (lt (int .Values.replicaCount) 3) }}
{{- fail "cluster.enabled requires replicaCount >= 3 (odd number) for a fault-tolerant Raft quorum. Set replicaCount=3 or higher, or disable cluster.enabled for single-node mode." }}
{{- end }}
{{- if eq .Values.controller.kind "StatefulSet" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vaults3.fullname" . }}
  labels:
    {{- include "vaults3.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "vaults3.fullname" . }}-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "vaults3.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the config changes.
        checksum/config: {{ .Values.config | toString | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "vaults3.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "vaults3.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: vaults3
          image: {{ include "vaults3.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.cluster.enabled }}
          # Auto-clustering (Beta): derive per-pod Raft identity from the
          # StatefulSet ordinal — pod-0 bootstraps, the rest auto-join it.
          command:
            - /bin/sh
            - -c
            - |
              ORD="${HOSTNAME##*-}"
              export VAULTS3_CLUSTER_ENABLED=true
              export VAULTS3_CLUSTER_NODE_ID="$HOSTNAME"
              export VAULTS3_CLUSTER_BIND_ADDR="$POD_IP"
              export VAULTS3_CLUSTER_RAFT_PORT={{ .Values.cluster.raftPort }}
              export VAULTS3_CLUSTER_DATA_DIR=/metadata/raft
              export VAULTS3_CLUSTER_JOIN_ADDR="{{ include "vaults3.fullname" . }}-headless:{{ .Values.service.port }}"
              # Authenticate inter-node calls with the (shared) admin secret key.
              export VAULTS3_CLUSTER_SECRET="$VAULTS3_SECRET_KEY"
              if [ "$ORD" = "0" ]; then
                export VAULTS3_CLUSTER_BOOTSTRAP=true
              else
                export VAULTS3_CLUSTER_BOOTSTRAP=false
              fi
              exec vaults3 -config /etc/vaults3/vaults3.yaml
          {{- else }}
          args:
            - "-config"
            - "/etc/vaults3/vaults3.yaml"
          {{- end }}
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
            {{- if .Values.cluster.enabled }}
            - name: raft
              containerPort: {{ .Values.cluster.raftPort }}
              protocol: TCP
            {{- end }}
          env:
            - name: VAULTS3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaults3.secretName" . }}
                  key: access-key
            - name: VAULTS3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaults3.secretName" . }}
                  key: secret-key
            - name: VAULTS3_DATA_DIR
              value: /data
            - name: VAULTS3_METADATA_DIR
              value: /metadata
            {{- if .Values.cluster.enabled }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/vaults3
              readOnly: true
            - name: data
              mountPath: /data
            - name: metadata
              mountPath: /metadata
      volumes:
        - name: config
          configMap:
            name: {{ include "vaults3.configMapName" . }}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        - name: metadata
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "vaults3.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.data.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.data.size | quote }}
        {{- if .Values.persistence.data.storageClass }}
        {{- if (eq "-" .Values.persistence.data.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ .Values.persistence.data.storageClass | quote }}
        {{- end }}
        {{- end }}
    - metadata:
        name: metadata
        labels:
          {{- include "vaults3.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.metadata.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.metadata.size | quote }}
        {{- if .Values.persistence.metadata.storageClass }}
        {{- if (eq "-" .Values.persistence.metadata.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ .Values.persistence.metadata.storageClass | quote }}
        {{- end }}
        {{- end }}
  {{- end }}
{{- end }}
